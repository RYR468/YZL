<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>导师招募 · 益志领</title>
<style>
  :root{--bg:#FAF8F3;--card:#fff;--panel:#F4EFE4;--panel2:#FBF7EE;--ink:#1F2A2E;--muted:#5E6B6A;--line:#E7DFCN;--line:#E7DFCF;--brand:#2E6B5E;--brand2:#214F60;--brand-l:#3A8275;--brand-bg:#EAF2EF;--gold:#C9A227;--good:#2E8B57;--warn:#B9791A;--bad:#BE5439;--serif:"Noto Serif SC","Source Han Serif SC","Songti SC","STSong","SimSun",serif;--sans:"Microsoft YaHei","PingFang SC",system-ui,sans-serif;}
  *{box-sizing:border-box;}
  body{margin:0;font-family:var(--sans);font-size:14px;background:var(--bg);color:var(--ink);line-height:1.55;}
  header{background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff;padding:18px 28px;display:flex;align-items:center;gap:14px;box-shadow:0 6px 22px rgba(33,79,96,.22);border-bottom:2px solid rgba(201,162,39,.55);}
  .logo{width:32px;height:32px;stroke:var(--gold);stroke-width:1.7;fill:none;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0;}
  header h1{font-family:var(--serif);font-size:20px;margin:0;font-weight:700;letter-spacing:1px;}
  header .sub{font-size:12.5px;opacity:.88;margin-top:2px;}
  header .right{margin-left:auto;font-size:12.5px;opacity:.85;}
  .wrap{max-width:880px;margin:0 auto;padding:24px 28px 44px;}
  .head{margin-bottom:18px;}
  .head h2{font-family:var(--serif);font-size:24px;margin:0 0 4px;}
  .head .sub{font-size:13px;color:var(--muted);}
  .hint{font-size:12.5px;color:var(--muted);background:var(--panel2);border:1px dashed var(--line);border-radius:10px;padding:10px 13px;margin-bottom:14px;line-height:1.7;}
  .hint b{color:var(--brand2);}
  .form{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:22px 24px;box-shadow:0 4px 14px rgba(31,46,40,.06);}
  .form fieldset{border:none;padding:0;margin:0 0 20px;}
  .form legend{font-size:14px;font-weight:700;color:var(--brand2);font-family:var(--serif);margin-bottom:12px;display:flex;align-items:center;gap:6px;}
  .form legend svg{width:16px;height:16px;stroke:var(--gold);stroke-width:1.8;fill:none;stroke-linecap:round;stroke-linejoin:round;}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px 16px;}
  @media(max-width:680px){.grid{grid-template-columns:1fr;}}
  .fld{display:flex;flex-direction:column;gap:4px;}
  .fld label{font-size:12.5px;color:var(--muted);}
  .fld label .req{color:var(--bad);}
  .fld input,.fld select{padding:8px 11px;border:1px solid var(--line);border-radius:9px;font-size:13.5px;background:#fff;color:var(--ink);font-family:var(--sans);}
  .fld input:focus,.fld select:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-bg);}
  .fld.full{grid-column:1/-1;}
  .actions{display:flex;gap:10px;align-items:center;margin-top:4px;}
  .btn{border:none;border-radius:10px;padding:10px 18px;font-size:14px;cursor:pointer;background:var(--brand);color:#fff;font-weight:600;font-family:var(--sans);display:inline-flex;align-items:center;gap:6px;}
  .btn:hover{background:var(--brand-l);}
  .btn[disabled]{opacity:.65;cursor:wait;}
  .btn.ghost{background:var(--panel);color:var(--ink);border:1px solid var(--line);}
  .btn svg{width:15px;height:15px;stroke:currentColor;stroke-width:1.8;fill:none;stroke-linecap:round;stroke-linejoin:round;}
  .spin{animation:sp .8s linear infinite;transform-origin:50% 50%;}
  @keyframes sp{to{transform:rotate(360deg);}}
  .rr{border-radius:14px;padding:16px 18px;margin-top:18px;border:1px solid var(--line);background:var(--card);}
  .rr.pass{border-color:#bfe3ce;background:#f0f8f3;}
  .rr.review{border-color:#e8d6ad;background:#fbf6e8;}
  .rr.reject{border-color:#e8c4b8;background:#fbf0ec;}
  .rr-t{font-size:16px;font-weight:700;font-family:var(--serif);}
  .rr.pass .rr-t{color:var(--good);} .rr.review .rr-t{color:var(--warn);} .rr.reject .rr-t{color:var(--bad);}
  .rr-id{font-size:13px;color:var(--muted);margin-top:4px;}
  .rr-id b{color:var(--brand2);font-family:var(--serif);}
  .rr ul{margin:10px 0 0;padding-left:18px;font-size:13px;line-height:1.8;}
  .rr .miss{font-size:13px;color:var(--warn);margin-top:8px;font-weight:600;}
  .rr .note{font-size:12.5px;color:var(--brand);margin-top:10px;background:var(--brand-bg);padding:8px 12px;border-radius:8px;}
  footer{text-align:center;padding:10px 28px 30px;font-size:12px;color:var(--muted);}
  footer b{color:var(--brand);font-family:var(--serif);}
</style></head>
<body>
<header>
  <svg class="logo" viewBox="0 0 24 24"><path d="M7 20h10"/><path d="M10 20c5.5-2.5.8-6.4 3-10"/><path d="M9.5 9.4c1.1.8 1.8 2.2 2.3 3.7-2 .4-3.5.4-4.8-.3-1.2-.6-2.3-1.9-3-4.2 2.8-.5 4.4 0 5.5.8z"/><path d="M14.1 6a7 7 0 0 0-1.1 4c1.9-.1 3.3-.6 4.3-1.4 1-1 1.6-2.3 1.7-4.6-2.7.1-4 1-4.9 2z"/></svg>
  <div><h1>益志领 · 导师招募</h1><div class="sub">感谢您愿意成为困境学子的志愿导师</div></div>
  <div class="right">上海益志领公益基金会</div>
</header>
<div class="wrap">
  <div class="head">
    <h2>志愿导师报名</h2>
    <div class="sub">填写以下信息,系统按招募标准自动初筛,并由管理员审核后正式纳入导师库。</div>
  </div>
  <div class="hint">招募硬标准:全球 <b>Top100 院校</b>毕业 <b>或</b> 世界<b>500强</b>中高层 <b>或</b> 优秀创业者。带 <span style="color:var(--bad)">*</span> 为必填;「资质类型 / 毕业院校」至少填一项用于初筛。</div>
  <form id="rf" class="form">
    <fieldset>
      <legend><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="5"/><path d="M3 21v-1a6 6 0 0 1 12 0v1"/></svg> 基本信息</legend>
      <div class="grid">
        <div class="fld"><label>姓名 / 编号(可留空)</label><input name="导师ID" placeholder="可填姓名或留空自动编号"></div>
        <div class="fld"><label>性别 <span class="req">*</span></label><select name="性别"><option value="">请选择</option><option>男</option><option>女</option></select></div>
        <div class="fld"><label>常住城市 <span class="req">*</span></label><input name="常住城市" list="dl-city" placeholder="选择或输入"></div>
        <div class="fld"><label>行业 <span class="req">*</span></label><input name="行业" list="dl-ind" placeholder="选择或输入"></div>
        <div class="fld full"><label>飞书手机号 <span class="req">*</span></label><input name="飞书手机号" placeholder="用于审核进度通知(请填写已绑定飞书的手机号)"></div>
      </div>
    </fieldset>
    <fieldset>
      <legend><svg viewBox="0 0 24 24"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg> 资质背景(初筛关键)</legend>
      <div class="grid">
        <div class="fld full"><label>资质类型</label><input name="资质类型" list="dl-qual" placeholder="选择或输入"></div>
        <div class="fld"><label>毕业院校</label><input name="毕业院校" list="dl-school" placeholder="选择或输入"></div>
        <div class="fld"><label>工作年限</label><input name="工作年限" type="number" min="0" placeholder="如 12"></div>
      </div>
    </fieldset>
    <fieldset>
      <legend><svg viewBox="0 0 24 24"><path d="M12 3l1.9 5.8a2 2 0 0 0 1.3 1.3L21 12l-5.8 1.9a2 2 0 0 0-1.3 1.3L12 21l-1.9-5.8a2 2 0 0 0-1.3-1.3L3 12l5.8-1.9a2 2 0 0 0 1.3-1.3L12 3z"/></svg> 辅导意愿</legend>
      <div class="grid">
        <div class="fld"><label>专精领域</label><input name="专精领域" list="dl-exp" placeholder="顿号分隔,可多选"></div>
        <div class="fld"><label>期望辅导区域</label><input name="期望辅导区域" list="dl-region" placeholder="选择或输入"></div>
        <div class="fld"><label>每月可用时长(小时)</label><input name="每月可用时长" type="number" min="0" placeholder="如 8"></div>
        <div class="fld"><label>可同时辅导人数</label><input name="可同时辅导人数" type="number" min="1" placeholder="如 3"></div>
        <div class="fld"><label>擅长授课主题</label><input name="擅长授课主题" list="dl-topic" placeholder="顿号分隔,可多选"></div>
        <div class="fld"><label>期望学员性别</label><select name="期望学员性别"><option value="">不限</option><option>男</option><option>女</option></select></div>
        <div class="fld full"><label>可提供服务</label><input name="可提供服务" list="dl-svc" placeholder="顿号分隔,可多选"></div>
      </div>
    </fieldset>
    <datalist id="dl-city"><option>上海</option><option>北京</option><option>广州</option><option>深圳</option><option>成都</option><option>杭州</option><option>武汉</option><option>南京</option><option>西安</option></datalist>
    <datalist id="dl-ind"><option>互联网</option><option>金融</option><option>科技</option><option>教育</option><option>医疗</option><option>法律</option><option>文化传媒</option><option>心理</option><option>公益</option></datalist>
    <datalist id="dl-qual"><option>世界500强中高层</option><option>全球前100强毕业</option><option>全球知名院校毕业</option><option>优秀创业者</option><option>资深专家</option></datalist>
    <datalist id="dl-school"><option>复旦大学</option><option>清华大学</option><option>北京大学</option><option>上海交通大学</option><option>浙江大学</option><option>南京大学</option><option>四川大学</option><option>中国政法大学</option><option>北京师范大学</option><option>华东师范大学</option></datalist>
    <datalist id="dl-exp"><option>互联网产品</option><option>金融投资</option><option>医疗医学</option><option>教育升学</option><option>科技软件</option><option>法律合规</option><option>心理咨询</option><option>文化传媒</option></datalist>
    <datalist id="dl-region"><option>不限</option><option>华东</option><option>华南</option><option>华北</option><option>西部</option><option>四川</option><option>广东</option></datalist>
    <datalist id="dl-topic"><option>职业规划</option><option>面试技巧</option><option>行业入门</option><option>学业规划</option><option>心理减压</option><option>简历修改</option><option>价值观引导</option><option>学习方法</option></datalist>
    <datalist id="dl-svc"><option>线上沟通</option><option>线下活动</option><option>公益营授课</option><option>电话回访</option></datalist>
    <div class="actions">
      <button type="submit" class="btn" id="submit"><svg viewBox="0 0 24 24"><path d="M22 2 11 13"/><path d="M22 2 15 22l-4-9-9-4 20-2z"/></svg> 提交报名 · AI 初筛</button>
      <button type="button" class="btn ghost" id="reset">清空表单</button>
    </div>
  </form>
  <div id="result"></div>
</div>
<footer>上海益志领公益基金会 · <b>让每一位导师的善意,都能被高效而温暖地传递</b></footer>
<script>
document.getElementById('rf').addEventListener('submit',function(e){
  e.preventDefault();
  var data={};
  new FormData(document.getElementById('rf')).forEach(function(v,k){data[k]=v;});
  var btn=document.getElementById('submit'),orig=btn.innerHTML;
  btn.disabled=true;btn.innerHTML='<svg class="spin" viewBox="0 0 24 24"><path d="M21 12a9 9 0 1 1-6.22-8.56"/></svg> 初筛中…';
  fetch('/api/recruit',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)})
    .then(function(r){return r.json();})
    .then(function(r){
      var cfg={pass:{t:'✓ 初筛通过,等待管理员审核'},review:{t:'⊙ 待管理员复核'},reject:{t:'✕ 暂不符合招募标准'}}[r.result]||{t:''};
      var h='<div class="rr '+r.result+'"><div class="rr-t">'+cfg.t+'</div>';
      if(r.mentor_id)h+='<div class="rr-id">编号：<b>'+r.mentor_id+'</b></div>';
      if(r.reasons&&r.reasons.length)h+='<ul>'+r.reasons.map(function(x){return '<li>'+x+'</li>';}).join('')+'</ul>';
      if(r.missing&&r.missing.length)h+='<div class="miss">请补充：'+r.missing.join('、')+'</div>';
      if(r.note)h+='<div class="note">'+r.note+'</div>';
      h+='</div>';
      var box=document.getElementById('result');box.innerHTML=h;box.scrollIntoView({behavior:'smooth',block:'nearest'});
    })
    .catch(function(){alert('提交失败,请重试');})
    .finally(function(){btn.disabled=false;btn.innerHTML=orig;});
});
document.getElementById('reset').addEventListener('click',function(){document.getElementById('rf').reset();document.getElementById('result').innerHTML='';});
</script>
</body></html>
